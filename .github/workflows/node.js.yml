name: Frontend-Photobogota

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Permisos necesarios para que el Action pueda escribir en la rama gh-pages
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Instalar dependencias
      run: npm install

    - name: Construir proyecto (Vite)
      run: npm run build

    # Paso nuevo para el despliegue automático
    - name: Deploy
      if: github.event_name == 'push' # Solo despliega cuando haces push a main
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist # Vite genera la salida en esta carpeta
        branch: gh-pages
