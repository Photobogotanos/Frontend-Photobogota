name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Usamos solo la versión 20 que es la LTS actual para ahorrar tiempo y recursos
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      # CI=false evita que los warnings de CSS o variables no usadas detengan el build
      run: CI=false npm run build --if-present

    - name: Run tests
      # WATCH=false hace que los tests se ejecuten una vez y terminen
      run: npm test -- --watchAll=false
